name: CI

# Gating workflow. Branch protection should require the `ci-pass` aggregator
# below before any PR can merge into `main`.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt && pip install -e ".[dev,yaml]"
      - run: ruff check .

  mypy:
    name: mypy (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt && pip install -e ".[dev,yaml]"
      - run: mypy

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt && pip install -e ".[dev,yaml]"
      - run: pytest

  ci-pass:
    # Aggregator. Make THIS the single required status check in branch protection.
    name: CI passed
    runs-on: ubuntu-latest
    needs: [ruff, mypy, test]
    steps:
      - run: echo "All gating jobs passed."

  publish:
    # Publishes to PyPI via OIDC trusted publishing. No API token needed.
    # Runs only on push to main, after all gating jobs pass. skip-existing
    # means non-bump pushes succeed quietly instead of failing on a dup upload.
    name: Publish to PyPI
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci-pass
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
